# GoReleaser configuration for appwrite-cli
# https://goreleaser.com

version: 2

project_name: appwrite-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: appwrite-cli
    main: ./cmd/appwrite-cli
    binary: appwrite-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    formats:
      - tar.gz
    formats_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

nfpms:
  - id: packages
    package_name: appwrite-cli
    vendor: AndroidPoet
    maintainer: AndroidPoet <noreply@androidpoet.dev>
    homepage: https://github.com/AndroidPoet/appwrite-cli
    description: "Fast, single-binary CLI for Appwrite — multi-profile, multi-format, multi-environment"
    license: MIT
    formats:
      - deb
      - rpm

release:
  github:
    owner: AndroidPoet
    name: appwrite-cli
  draft: false
  prerelease: auto
  footer: |
    ## Installation
    ```bash
    brew tap AndroidPoet/tap && brew install appwrite-cli
    ```
    Or download from the assets below.
